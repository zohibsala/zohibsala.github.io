<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Zohib Sala</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <h1>Zohib.</h1>
            </div>
            <div class="nav-right" id="nav-menu">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
            <div class="mobile-menu-toggle" id="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="contact-page">
        <header class="contact-header fade-in-up">
            <h1>Contact</h1>
        </header>
        <section class="contact-content fade-in-up">
            <div class="contact-info">
                <!-- Email Card - Uses CSS styles from style.css -->
                <div class="contact-card">
                    <img src="images/email-icon.svg" alt="Email" class="contact-icon-svg">
                    <h3>Email</h3>
                    <p>I usually reply within 24 hours.</p>
                    <a class="contact-link" href="mailto:zohibsala@gmail.com">
                        Send an email
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17" /></svg>
                    </a>
                </div>

                <!-- LinkedIn Card - Uses CSS styles from style.css -->
                <div class="contact-card">
                    <img src="images/linkedin-icon.svg" alt="LinkedIn" class="contact-icon-svg">
                    <h3>LinkedIn</h3>
                    <p>Connect with me professionally.</p>
                    <a class="contact-link" href="https://linkedin.com/in/zohib-sala" target="_blank" rel="noopener noreferrer">
                        View profile
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17" /></svg>
                    </a>
                </div>

                <!-- Coming Soon Card - Uses CSS styles from style.css -->
                <div class="coming-soon-card">
                    <img src="images/coming-soon-icon.svg" alt="Coming Soon" class="coming-soon-icon-svg">
                    <h3>More Work Coming Soon!</h3>
                    <p>New projects are in development.</p>
                    <div class="coming-soon-status">
                        <span class="status-dot"></span>
                        <span>In Progress</span>
                    </div>
                </div>
            </div>
            <div class="form-container">
                <h3>Send a Message</h3>
                <form class="contact-form" action="https://formsubmit.co/zohibsala@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="box">
                    <div class="form-group">
                        <input id="name" name="name" type="text" placeholder=" " required />
                        <label for="name">Your Name</label>
                    </div>
                    <div class="form-group">
                        <input id="email" name="email" type="email" placeholder=" " required />
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" placeholder=" " required></textarea>
                        <label for="message">Your Message</label>
                    </div>
                    <button class="btn-primary" type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="social-media">
                <a href="mailto:zohibsala@gmail.com" class="social-link" aria-label="Email Contact">
                    <svg class="social-icon gmail-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4.5-8 5-8-5V6l8 5 8-5v2.5Z" />
                    </svg>
                </a>
                <a href="https://linkedin.com/in/zohib-sala" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
                    <svg class="social-icon linkedin-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M20.447 20.452H16.89v-5.18c0-1.237-.026-2.83-1.724-2.83-1.725 0-1.988 1.347-1.988 2.739v5.271H9.62V9h3.41v1.561h.049c.476-.9 1.64-1.85 3.372-1.85 3.604 0 4.273 2.371 4.273 5.457v6.284zM5.337 7.433C4.19 7.433 3.27 6.507 3.27 5.368c0-1.139.92-2.063 2.067-2.063 1.14 0 2.06.925 2.06 2.063 0 1.139-.92 2.065-2.06 2.065zM6.999 20.452H3.675V9H7v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.454C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z" />
                    </svg>
                </a>
            </div>
            <p class="footer-text">
                &copy; 2026 Zohib Sala. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const mobileMenuToggle = document.getElementById("mobile-menu-toggle");
        const navMenu = document.getElementById("nav-menu");
        mobileMenuToggle.addEventListener("click", () => {
            navMenu.classList.toggle("active");
            mobileMenuToggle.classList.toggle("active");
        });

        // Navbar scroll effect
        const navbar = document.getElementById("navbar");
        window.addEventListener("scroll", () => {
            if (window.scrollY > 50) {
                navbar.classList.add("scrolled");
            } else {
                navbar.classList.remove("scrolled");
            }
        });

        // Floating labels
        document.querySelectorAll('.form-group input, .form-group textarea').forEach((input) => {
            input.addEventListener('focus', (e) => {
                e.target.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', (e) => {
                if (!e.target.value) e.target.parentElement.classList.remove('focused');
            });
        });
    </script>
</body>
</html>
